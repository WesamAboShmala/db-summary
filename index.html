<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>موقع التلاخيص الدراسية 📚</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body { direction: rtl; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .sidebar { text-align: right; }
    .markdown-section { text-align: right; direction: rtl; }
  </style>
</head>
<body>
  <div id="app">جاري تحميل التلاخيص...</div>
  <script>
    window.$docsify = {
      name: 'تلاخيص Database',
      loadSidebar: true,
      subMaxLevel: 2,
      search: { placeholder: 'ابحث في التلاخيص...', noData: 'لا توجد نتائج!', depth: 6 }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
